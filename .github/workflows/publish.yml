name: Publish

on:
  push:
    tags:
      - "v*.*.*"

env:
  CARGO_TERM_COLOR: always

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org"

      - name: Set crate versions from tag
        run: |
          version="${GITHUB_REF_NAME#v}"
          sed -i "0,/^version = \".*\"/s//version = \"$version\"/" Cargo.toml
          sed -i "0,/^version = \".*\"/s//version = \"$version\"/" wasm/Cargo.toml

      - name: Test
        run: cargo test --all-targets

      - name: Publish to crates.io
        run: cargo publish -p blue-marshal
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

      - name: Install wasm-pack
        run: curl https://rustwasm.github.io/wasm-pack/installer/init.sh -sSf | sh

      - name: Build wasm package
        run: wasm-pack build wasm --target bundler --out-dir pkg --scope truebrain

      - name: Rename npm package to @truebrain/blue-marshal
        run: |
          jq '.name = "@truebrain/blue-marshal"' wasm/pkg/package.json > wasm/pkg/package.json.tmp
          mv wasm/pkg/package.json.tmp wasm/pkg/package.json

      - name: Publish to npm
        run: npm publish ./wasm/pkg --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
