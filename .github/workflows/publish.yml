name: Publish

on:
  push:
    tags:
      - "v*.*.*"

env:
  CARGO_TERM_COLOR: always

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Check tag matches Cargo.toml version
        run: |
          tag_version="${GITHUB_REF_NAME#v}"
          crate_version="$(cargo metadata --no-deps --format-version 1 | jq -r '.packages[] | select(.name == "blue-marshal") | .version')"
          if [ "$tag_version" != "$crate_version" ]; then
            echo "Tag v$tag_version does not match Cargo.toml version $crate_version"
            exit 1
          fi

      - name: Test
        run: cargo test --all-targets

      - name: Publish to crates.io
        run: cargo publish --locked -p blue-marshal
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
