name: Publish

on:
  push:
    tags:
      - "v*.*.*"

env:
  CARGO_TERM_COLOR: always

jobs:
  publish:
    runs-on: ubuntu-latest
    environment: release

    permissions:
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          registry-url: 'https://registry.npmjs.org'
          package-manager-cache: false

      - name: Set crate versions from tag
        run: |
          version="${GITHUB_REF_NAME#v}"
          sed -i "0,/^version = \".*\"/s//version = \"$version\"/" Cargo.toml
          sed -i "0,/^version = \".*\"/s//version = \"$version\"/" wasm/Cargo.toml

      - name: Test
        run: cargo test --all-targets

      - name: Authenticate with crates.io
        uses: rust-lang/crates-io-auth-action@v1
        id: auth

      - name: Publish to crates.io
        run: cargo publish --allow-dirty -p blue-marshal
        env:
          CARGO_REGISTRY_TOKEN: ${{ steps.auth.outputs.token }}

      - name: Install wasm-pack
        run: curl https://rustwasm.github.io/wasm-pack/installer/init.sh -sSf | sh

      - name: Build wasm package
        run: wasm-pack build wasm --target bundler --out-dir pkg --scope truebrain

      - name: Rename npm package to @truebrain/blue-marshal
        run: |
          jq '.name = "@truebrain/blue-marshal"' wasm/pkg/package.json > wasm/pkg/package.json.tmp
          mv wasm/pkg/package.json.tmp wasm/pkg/package.json

      - name: Publish to npm
        run: npm publish ./wasm/pkg --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
